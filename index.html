<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Sign Detector AI</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
  <script src="https://cdn.jsdelivr.net/npm/fingerpose@0.1.0/dist/fingerpose.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1e1e1e);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1500px;
      background: rgba(24,24,24,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 45px;
      box-shadow: 0 0 40px rgba(255,255,255,0.08);
      text-align: center;
    }

    h1 {
      font-size: 4.5rem;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #00ff99, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #bbbbbb;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .video-wrapper {
      position: relative;
      width: 1100px;
      box-shadow: 0 0 40px rgba(0,255,153,0.4);
      border: 5px solid #00ff99;
      max-width: 100%;
      margin: auto;
      border-radius: 20px;
      overflow: hidden;
      border: 4px solid white;
    }

    video {
      width: 100%;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    .result {
      margin-top: 25px;
      background: linear-gradient(145deg, #242424, #1b1b1b);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 0 25px rgba(0,255,153,0.08);
      padding: 20px;
      border-radius: 18px;
    }

    .gesture {
      font-size: 2.2rem;
      font-weight: bold;
      color: #00ff99;
      margin-top: 10px;
    }

    .confidence {
      color: #cccccc;
      margin-top: 8px;
      font-size: 1.1rem;
    }

    .instructions {
      margin-top: 35px;
      text-align: left;
      background: linear-gradient(145deg, #202020, #181818);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 18px;
    }

    .instructions h2 {
      margin-bottom: 15px;
    }

    .instructions li {
      margin: 10px 0;
      color: #dddddd;
    }

    .status {
      margin-top: 20px;
      color: #ffd166;
      font-size: 1rem;
    }

    button {
      margin-top: 20px;
      padding: 14px 30px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #00ff99, #00ccff);
      box-shadow: 0 0 25px rgba(0,255,153,0.4);
      color: #0f0f0f;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(0,255,153,0.6);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Hand Sign Detector AI</h1>
  <p class="subtitle">Live webcam gesture recognition using TensorFlow.js</p>

  <div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <button onclick="startDetection()">Start Detection</button>

  <div class="status" id="status">Waiting to start...</div>

  <div class="result">
    <h2>Detected Gesture</h2>
    <div class="gesture" id="gesture">None</div>
    <div class="confidence" id="confidence">Confidence: 0%</div>
  </div>

  <div class="instructions">
    <h2>Supported Hand Signs</h2>
    <ul>
      <li>👍 Thumbs Up</li>
      <li>✌️ Peace Sign</li>
      <li>✋ Open Palm</li>
      <li>👊 Fist</li>
    </ul>

    
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const gestureText = document.getElementById('gesture');
  const confidenceText = document.getElementById('confidence');
  const statusText = document.getElementById('status');

  let model;

  async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });

    video.srcObject = stream;

    return new Promise((resolve) => {
      video.onloadedmetadata = () => {
        resolve(video);
      };
    });
  }

  async function loadHandposeModel() {
    statusText.innerText = 'Loading AI model...';
    model = await handpose.load();
    statusText.innerText = 'AI model loaded successfully';
  }

  function detectGesture(landmarks) {
    const thumbTip = landmarks[4];
    const thumbBase = landmarks[2];

    const indexTip = landmarks[8];
    const middleTip = landmarks[12];
    const ringTip = landmarks[16];
    const pinkyTip = landmarks[20];

    const wrist = landmarks[0];

    // THUMBS UP
    if (
      thumbTip[1] < thumbBase[1] &&
      indexTip[1] > thumbTip[1] &&
      middleTip[1] > thumbTip[1]
    ) {
      return {
        name: '👍 Thumbs Up',
        confidence: 96
      };
    }

    // PEACE SIGN
    if (
      indexTip[1] < wrist[1] &&
      middleTip[1] < wrist[1] &&
      ringTip[1] > indexTip[1] &&
      pinkyTip[1] > indexTip[1]
    ) {
      return {
        name: '✌️ Peace Sign',
        confidence: 92
      };
    }

    // OPEN PALM
    if (
      indexTip[1] < wrist[1] &&
      middleTip[1] < wrist[1] &&
      ringTip[1] < wrist[1] &&
      pinkyTip[1] < wrist[1]
    ) {
      return {
        name: '✋ Open Palm',
        confidence: 95
      };
    }

    // FIST
    if (
      indexTip[1] > wrist[1] &&
      middleTip[1] > wrist[1] &&
      ringTip[1] > wrist[1] &&
      pinkyTip[1] > wrist[1]
    ) {
      return {
        name: '👊 Fist',
        confidence: 90
      };
    }

    return {
      name: 'Unknown Gesture',
      confidence: 40
    };
  }

  function drawHand(predictions) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    predictions.forEach(prediction => {
      const landmarks = prediction.landmarks;

      for (let i = 0; i < landmarks.length; i++) {
        const x = landmarks[i][0];
        const y = landmarks[i][1];

        ctx.beginPath();
        ctx.arc(x, y, 5, 0, 3 * Math.PI);
        ctx.fillStyle = '#00ff99';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ff99';
        ctx.fill();
      }
    });
  }

  async function detectHands() {
    const predictions = await model.estimateHands(video);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    if (predictions.length > 0) {
      drawHand(predictions);

      const landmarks = predictions[0].landmarks;
      const gesture = detectGesture(landmarks);

      gestureText.innerText = gesture.name;
      confidenceText.innerText = `Confidence: ${gesture.confidence}%`;
    } else {
      gestureText.innerText = 'No Hand Detected';
      confidenceText.innerText = 'Confidence: 0%';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(detectHands);
  }

  async function startDetection() {
    try {
      statusText.innerText = 'Starting webcam...';

      await setupCamera();
      video.play();

      await loadHandposeModel();

      statusText.innerText = 'Detection running';

      detectHands();
    } catch (error) {
      console.error(error);
      statusText.innerText = 'Camera access denied or error occurred';
    }
  }
</script>

</body>
</html>
